package:
  name: pyswark
  version: 0.0.8

about:
  author : pyt3r
  license_file: LICENSE
  summary: python swiss army knife

source:
  path: ..

build:
  noarch: python
  entry_points:
    - pyswark-entry-point = pyswark.scripts.hello:world

requirements:
  build:
    - python>=3.9
    - pip
    - setuptools
    - pyyaml
    - numpy
    - pandas
    - pyarrow
    - sqlmodel
    - sqlalchemy
    - pydantic
    - fsspec
    - requests
    - aiohttp
    - aenum
    - beautifulsoup4
    - holoviews
    - panel
    - bokeh
    - jupyter_bokeh

  run:
    - python>=3.9
    - pyyaml
    - coverage
